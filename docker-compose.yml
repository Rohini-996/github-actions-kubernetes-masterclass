services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - skillpulse
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    
  backend:
    image: rohinidivekar123/skillpulse-backend:latest
    build: ./backend
    restart: unless-stopped
    networks:
      - skillpulse
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: skillpulse
      DB_PASSWORD: skillpulse123
      DB_NAME: skillpulse
      PORT: "8080"
  
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: rohinidivekar123/skillpulse-frontend:latest
    build: ./frontend
    restart: unless-stopped
    networks:
      - skillpulse
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:

networks:
  skillpulse:
