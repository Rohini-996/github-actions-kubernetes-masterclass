name: ci-gitops

on:
  push:
    branches:
      - main

    paths-ignore:
      - "docs/**"
      - "**/*.md"

  pull_request:
    branches:
      - main

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend

jobs:

  # =========================================================
  # CODE QUALITY + SECURITY
  # =========================================================

  quality-security:
    name: Code Quality & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------------- GO SETUP ---------------- #

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      # ---------------- GO TESTS ---------------- #

      - name: Run Backend Tests
        working-directory: ./backend
        run: |
          go mod tidy
          go test ./... -v

      # ---------------- TRIVY FS SCAN ---------------- #

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0
          
      # ---------------- DOCKERFILE LINT ---------------- #

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          ignore: DL3018

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          ignore: DL3018

  # =========================================================
  # BUILD & PUSH IMAGES
  # =========================================================

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    needs:
      - quality-security

    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: backend
            context: ./backend
            image: skillpulse-backend

          - name: frontend
            context: ./frontend
            image: skillpulse-frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------------- BUILDX ---------------- #

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------------- LOGIN ---------------- #

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # ---------------- METADATA ---------------- #

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}

          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=branch

      # ---------------- BUILD ---------------- #

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}

          push: true

          tags: ${{ steps.meta.outputs.tags }}

          labels: ${{ steps.meta.outputs.labels }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================
  # UPDATE GITOPS MANIFESTS
  # =========================================================

  update-gitops-manifests:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest

    needs:
      - build-and-push

    if: github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---------------- UPDATE BACKEND IMAGE ---------------- #

      - name: Update Backend Deployment Image
        run: |
          sed -i 's|image: .*skillpulse-backend.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.sha }}|g' k8s/20-backend.yaml 

      # ---------------- UPDATE FRONTEND IMAGE ---------------- #

      - name: Update Frontend Deployment Image
        run: |
          sed -i 's|image: .*skillpulse-frontend.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}|g' k8s/30-frontend.yaml

      # ---------------- COMMIT ---------------- #

      - name: Commit Updated Manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/

          git commit -m "ci: update image tags to ${GITHUB_SHA}" || echo "No changes to commit"

          git push
